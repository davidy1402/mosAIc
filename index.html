<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearBox // AI-Defined Vehicle Incident Intelligence - Mercedes-Benz Vibathon</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- jsPDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg-color: #03050a;
      --mbux-frame-bg: #070a14;
      --card-bg: rgba(12, 17, 30, 0.7);
      --border-color: rgba(255, 255, 255, 0.07);
      
      --accent-cyan: #00ebd6;
      --accent-cyan-glow: rgba(0, 235, 214, 0.3);
      --accent-blue: #0088ff;
      --accent-red: #ff3b30;
      --accent-red-glow: rgba(255, 59, 48, 0.4);
      --accent-orange: #ff9f0a;
      
      --font-primary: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --transition-standard: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      --transition-fast: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    html {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      background-color: var(--bg-color);
      color: #e2e8f0;
      font-family: var(--font-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Widescreen Ambient Lighting */
    body::before {
      content: '';
      position: fixed;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(0, 235, 214, 0.03) 0%, rgba(0,0,0,0) 70%);
      bottom: -30%;
      left: -10%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(0, 136, 255, 0.02) 0%, rgba(0,0,0,0) 70%);
      top: -30%;
      right: -10%;
      pointer-events: none;
      z-index: 0;
    }

    /* Cyber grid background */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.005) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      pointer-events: none;
    }

    /* MBUX Hyperscreen Chassis frame */
    .hyperscreen-container {
      width: 100vw;
      height: 100vh;
      background: rgba(6, 8, 12, 0.9);
      border: none;
      border-radius: 0;
      box-shadow: 
        inset 0 0 25px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(40px);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    /* System Header Section */
    .dashboard-header {
      height: 90px;
      border-bottom: 1px solid var(--border-color);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5, 7, 12, 0.5);
      position: relative;
      z-index: 20;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .m-benz-logo-img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .title-area {
      display: flex;
      flex-direction: column;
    }

    .main-title {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #fff 40%, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(0, 235, 214, 0.05);
    }

    .sub-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #64748b;
      font-weight: 600;
      margin-top: 2px;
    }

    /* Simulation Control Button */
    .sim-button-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .sim-btn {
      padding: 12px 24px;
      border-radius: 30px;
      border: 1px solid var(--accent-red);
      background: rgba(255, 59, 48, 0.08);
      color: #fff;
      font-family: var(--font-primary);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition-fast);
      box-shadow: 
        0 4px 15px rgba(255, 59, 48, 0.15),
        inset 0 0 10px rgba(255, 59, 48, 0.05);
    }

    .sim-btn i {
      font-size: 12px;
      animation: alert-flash 1s infinite alternate;
    }

    .sim-btn:hover {
      background: var(--accent-red);
      box-shadow: 
        0 0 25px var(--accent-red),
        0 4px 15px rgba(255, 59, 48, 0.3);
      transform: translateY(-1px);
    }

    .sim-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .sim-btn.simulating {
      border-color: var(--accent-cyan);
      background: rgba(0, 235, 214, 0.08);
      box-shadow: 
        0 0 25px rgba(0, 235, 214, 0.2),
        0 4px 15px rgba(0, 235, 214, 0.1);
      cursor: not-allowed;
      pointer-events: none;
    }

    .sim-btn.simulating i {
      animation: spin 2s infinite linear;
    }

    .sim-btn.reset-state {
      border-color: var(--accent-cyan);
      background: rgba(0, 235, 214, 0.08);
      color: #fff;
      box-shadow: 
        0 4px 15px rgba(0, 235, 214, 0.15),
        inset 0 0 10px rgba(0, 235, 214, 0.05);
    }

    .sim-btn.reset-state:hover {
      background: var(--accent-cyan);
      color: #03050a;
      box-shadow: 
        0 0 25px var(--accent-cyan),
        0 4px 15px rgba(0, 235, 214, 0.3);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes alert-flash {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* System stats bar */
    .system-status {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .sys-time {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #94a3b8;
    }

    .sys-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0, 235, 214, 0.04);
      border: 1px solid rgba(0, 235, 214, 0.12);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent-cyan);
      box-shadow: inset 0 0 8px rgba(0, 235, 214, 0.02);
    }

    .sys-badge.danger-badge {
      background: rgba(255, 59, 48, 0.08);
      border-color: rgba(255, 59, 48, 0.25);
      color: var(--accent-red);
      animation: alert-pulse-badge 1s infinite alternate;
    }

    @keyframes alert-pulse-badge {
      0% { box-shadow: 0 0 2px var(--accent-red); }
      100% { box-shadow: 0 0 10px var(--accent-red); }
    }

    .sys-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 6px var(--accent-cyan);
    }

    .sys-badge.danger-badge .sys-badge-dot {
      background: var(--accent-red);
      box-shadow: 0 0 6px var(--accent-red);
    }

    /* Main Console Workspace */
    .workspace-area {
      flex: 1;
      padding: 20px 40px 10px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 10;
      overflow: hidden;
    }

    /* Premium Menu Tabs */
    .tab-bar-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid var(--border-color);
      padding: 6px 16px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .tabs-group {
      display: flex;
      gap: 8px;
    }

    .tab-trigger {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-family: var(--font-primary);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 10px;
      transition: var(--transition-fast);
      position: relative;
    }

    .tab-trigger i {
      font-size: 14px;
    }

    .tab-trigger:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.02);
    }

    .tab-trigger.active-tab {
      color: #fff;
      background: rgba(0, 235, 214, 0.05);
      border: 1px solid rgba(0, 235, 214, 0.15);
      box-shadow: 
        0 0 15px rgba(0, 235, 214, 0.04),
        inset 0 0 8px rgba(0, 235, 214, 0.02);
    }

    .tab-trigger.active-tab::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: var(--accent-cyan);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent-cyan);
    }

    /* Tab secondary controls */
    .tab-controls {
      display: flex;
      gap: 12px;
    }

    .fullscreen-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      color: #94a3b8;
      cursor: pointer;
      font-family: var(--font-primary);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition-fast);
    }

    .fullscreen-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.12);
    }

    /* Screen display housing the iframes */
    .screen-panel {
      flex: 1;
      height: 75vh;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 15px 45px rgba(0, 0, 0, 0.7),
        inset 0 0 30px rgba(0, 0, 0, 0.9);
    }

    .module-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: transparent;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .module-iframe.active-iframe {
      display: block;
      opacity: 1;
    }

    /* Expanded View Modal Overlay Styles */
    .screen-panel.expanded-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100% !important;
      z-index: 500;
      border: 1.5px solid var(--accent-cyan);
      box-shadow: 
        0 25px 60px rgba(0, 0, 0, 0.95),
        0 0 35px rgba(0, 235, 214, 0.15);
      border-radius: 16px;
      transition: var(--transition-standard);
    }

    .exit-expand-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      padding: 10px 20px;
      border: 1.5px solid var(--accent-cyan);
      background: rgba(10, 14, 24, 0.9);
      color: var(--accent-cyan);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-primary);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 15px rgba(0, 235, 214, 0.3);
      transition: var(--transition-fast);
      backdrop-filter: blur(10px);
    }

    .exit-expand-btn:hover {
      background: var(--accent-cyan);
      color: #03050a;
      box-shadow: 0 0 25px var(--accent-cyan);
    }

    /* Widescreen simulation HUD overlay overlay */
    .sim-hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 7, 12, 0.75);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 16px;
    }

    .sim-hud-overlay.show-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .hud-box {
      width: 80%;
      max-width: 650px;
      background: rgba(18, 22, 33, 0.85);
      border: 1.5px solid var(--accent-red);
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.9),
        0 0 35px rgba(255, 59, 48, 0.15),
        inset 0 0 20px rgba(255, 59, 48, 0.05);
      border-radius: 20px;
      padding: 30px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Grid overlay on alert */
    .hud-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(255, 59, 48, 0.03) 1px, transparent 0);
      background-size: 15px 15px;
      pointer-events: none;
    }

    .hud-icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255, 59, 48, 0.1);
      border: 2px solid var(--accent-red);
      color: var(--accent-red);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: alert-pulse-hud 1s infinite alternate;
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.2);
    }

    @keyframes alert-pulse-hud {
      0% { transform: scale(0.9); box-shadow: 0 0 10px rgba(255, 59, 48, 0.2); }
      100% { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 59, 48, 0.5); }
    }

    .hud-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-red);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hud-msg {
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.5;
      color: #fff;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Small diagnostic step indicator */
    .step-indicator {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 20px;
      width: 100%;
    }

    .step-node {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #475569;
      position: relative;
    }

    .step-node::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #475569;
    }

    .step-node.step-active {
      color: var(--accent-cyan);
    }

    .step-node.step-active::before {
      background: var(--accent-cyan);
      box-shadow: 0 0 8px var(--accent-cyan);
      animation: alert-flash 0.5s infinite alternate;
    }

    .step-node.step-completed {
      color: var(--accent-blue);
    }

    .step-node.step-completed::before {
      background: var(--accent-blue);
      box-shadow: 0 0 8px var(--accent-blue);
    }

    .step-connector {
      width: 30px;
      height: 1px;
      background: #1e293b;
    }

    .step-connector.step-completed {
      background: var(--accent-blue);
    }

    /* Subtle screen framing overlays */
    .mbux-glare {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 35%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.015) 0%, rgba(255, 255, 255, 0) 100%);
      pointer-events: none;
      z-index: 100;
    }

    /* HUD timeline loader bar */
    .hud-progress-bar-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }

    .hud-progress-bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-red), var(--accent-cyan));
      border-radius: 2px;
      transition: width 3.5s linear;
    }

    @media (max-width: 1100px) {
      body {
        align-items: flex-start;
        padding: 10px;
        height: auto;
        overflow-y: auto;
      }

      .hyperscreen-container {
        width: 100%;
        height: auto;
        min-height: 100vh;
        max-height: none;
        border-radius: 18px;
        overflow: visible;
      }

      .dashboard-header {
        height: auto;
        min-height: 84px;
        padding: 18px 20px;
        flex-wrap: wrap;
        gap: 14px;
      }

      .sim-button-wrap {
        position: static;
        transform: none;
        order: 3;
        width: 100%;
      }

      .sim-btn {
        width: 100%;
        justify-content: center;
      }

      .system-status {
        margin-left: auto;
        gap: 12px;
      }

      .workspace-area {
        padding: 16px;
        overflow: visible;
      }

      .tab-bar-container {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .tabs-group {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 8px;
        width: 100%;
      }
      .tabs-group::-webkit-scrollbar {
        display: none;
      }

      .tab-trigger {
        flex-shrink: 0;
        padding: 8px 14px;
        font-size: 12px;
        justify-content: center;
      }

      .tab-controls {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        width: 100%;
      }

      .fullscreen-btn {
        padding: 8px 12px;
        font-size: 11px;
        justify-content: center;
        width: 100%;
      }

      .screen-panel {
        height: auto;
        min-height: 500px;
      }

      .step-indicator {
        flex-wrap: wrap;
        gap: 10px;
      }

      .step-connector {
        display: none;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
      }

      .hyperscreen-container {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .m-benz-logo-img,
      .sys-time {
        display: none;
      }

      .main-title {
        font-size: 1.2rem;
      }

      .sub-title {
        letter-spacing: 1.7px;
        line-height: 1.35;
      }

      .screen-panel {
        min-height: 720px;
      }

      .hud-box {
        width: calc(100% - 24px);
        padding: 24px 18px;
      }

      .hud-msg {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <!-- Hyperscreen Chassis frame -->
  <div class="hyperscreen-container">
    <div class="mbux-glare"></div>

    <!-- Top Cockpit Header -->
    <header class="dashboard-header">
      <div class="brand-group">
        <img src="mercedeslogo.png" class="m-benz-logo-img" alt="Mercedes-Benz Logo">
        <div class="title-area">
          <h1 class="main-title">ClearBox</h1>
          <span class="sub-title">AI-Defined Vehicle Incident Intelligence</span>
        </div>
      </div>

      <!-- Main Action Button -->
      <div class="sim-button-wrap">
        <button class="sim-btn" id="sim-trigger">
          <i class="fa-solid fa-triangle-exclamation"></i> Simulate Crash Event
        </button>
      </div>

      <!-- Right stats -->
      <div class="system-status">
        <div class="sys-badge" id="system-status-badge">
          <div class="sys-badge-dot"></div> <span id="system-status-text">Active Monitoring</span>
        </div>
        <div class="sys-time" id="clock-display">15:34:00</div>
      </div>
    </header>

    <!-- Content Workspace -->
    <main class="workspace-area">
      
      <!-- Interactive Menu Tabs -->
      <div class="tab-bar-container">
        <div class="tabs-group">
          <button class="tab-trigger active-tab" onclick="switchTab('reconstruction')">
            <i class="fa-solid fa-circle-nodes"></i> Crash Reconstruction
          </button>
          <button class="tab-trigger" onclick="switchTab('vitals')">
            <i class="fa-solid fa-heart-pulse"></i> Vital Signs
          </button>
          <button class="tab-trigger" onclick="switchTab('road')">
            <i class="fa-solid fa-chart-network"></i> Road Memory
          </button>
          <button class="tab-trigger" onclick="switchTab('autopilot')">
            <i class="fa-solid fa-compass"></i> Autopilot HUD
          </button>
        </div>

        <div class="tab-controls">
          <button class="fullscreen-btn" id="evidence-btn" aria-label="Download evidence packet">
            <i class="fa-solid fa-file-arrow-down"></i> Evidence Packet
          </button>
          <button class="fullscreen-btn" id="full-screen-btn">
            <i class="fa-solid fa-expand"></i> Expand View
          </button>
        </div>
      </div>

      <!-- Integrated Glass Screen Panel for Iframes -->
      <div class="screen-panel" id="main-screen-panel">
        <!-- Floating Exit Expanded View button -->
        <button class="exit-expand-btn" id="exit-expand-btn" style="display: none;">
          <i class="fa-solid fa-compress"></i> Exit Expanded View
        </button>
        <iframe id="iframe-reconstruction" class="module-iframe active-iframe" src="demos/crash-reconstruction.html"></iframe>
        <iframe id="iframe-vitals" class="module-iframe" src="demos/vital-signs.html"></iframe>
        <iframe id="iframe-road" class="module-iframe" src="demos/road-memory.html"></iframe>
        <iframe id="iframe-autopilot" class="module-iframe" src="demos/driving-visualization.html"></iframe>

        <!-- Diagnostic Simulation HUD overlay overlay -->
        <div class="sim-hud-overlay" id="sim-overlay">
          <div class="hud-box">
            <div class="hud-icon-wrap"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="hud-title">DIAGNOSTIC SYSTEM INTRUSION</div>
            <div class="hud-msg" id="hud-message">Impact detected. Reconstructing crash truth...</div>
            
            <div class="hud-progress-bar-wrap">
              <div class="hud-progress-bar-inner" id="hud-bar"></div>
            </div>

            <!-- Simulation Diagnostics Step indicator -->
            <div class="step-indicator">
              <div class="step-node step-active" id="step-node-1">1. Truth</div>
              <div class="step-connector" id="step-conn-1"></div>
              <div class="step-node" id="step-node-2">2. Health</div>
              <div class="step-connector" id="step-conn-2"></div>
              <div class="step-node" id="step-node-3">3. Road Memory</div>
              <div class="step-connector" id="step-conn-3"></div>
              <div class="step-node" id="step-node-4">4. Report</div>
            </div>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script>
    // --- State Management ---
    let currentTab = 'reconstruction';
    let isCrashActive = false;

    const tabs = {
      reconstruction: {
        iframeId: 'iframe-reconstruction',
        filePath: 'demos/crash-reconstruction.html'
      },
      vitals: {
        iframeId: 'iframe-vitals',
        filePath: 'demos/vital-signs.html'
      },
      road: {
        iframeId: 'iframe-road',
        filePath: 'demos/road-memory.html'
      },
      autopilot: {
        iframeId: 'iframe-autopilot',
        filePath: 'demos/driving-visualization.html'
      }
    };

    // --- Tab Switching ---
    function switchTab(tabKey) {
      if (currentTab === tabKey) return;
      
      // Update Tab Triggers Style
      const triggers = document.querySelectorAll('.tab-trigger');
      triggers.forEach(trigger => {
        trigger.classList.remove('active-tab');
      });

      // Find trigger matching tab content
      const index = Object.keys(tabs).indexOf(tabKey);
      if (index !== -1) {
        triggers[index].classList.add('active-tab');
      }

      // Hide all active iframes, show the target one
      const iframes = document.querySelectorAll('.module-iframe');
      iframes.forEach(iframe => {
        iframe.classList.remove('active-iframe');
      });

      const activeIframe = document.getElementById(tabs[tabKey].iframeId);
      if (activeIframe) {
        activeIframe.classList.add('active-iframe');
      }

      currentTab = tabKey;
      if (tabKey === 'road') {
        setTimeout(() => postToIframe('iframe-road', 'MAP_VISIBLE'), 80);
      } else if (tabKey === 'vitals') {
        setTimeout(() => postToIframe('iframe-vitals', 'VITALS_VISIBLE'), 80);
      } else if (tabKey === 'autopilot') {
        setTimeout(() => postToIframe('iframe-autopilot', 'AUTOPILOT_VISIBLE'), 80);
      }

      // Trigger immediate resize check
      setTimeout(resizeIframeToFitContent, 50);
    }



    // --- System Clock ---
    function updateClock() {
      const display = document.getElementById('clock-display');
      const now = new Date();
      let hours = now.getHours().toString().padStart(2, '0');
      let minutes = now.getMinutes().toString().padStart(2, '0');
      let seconds = now.getSeconds().toString().padStart(2, '0');
      display.innerText = `${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- Simulation Sequence ---
    const simBtn = document.getElementById('sim-trigger');
    const simOverlay = document.getElementById('sim-overlay');
    const hudMessage = document.getElementById('hud-message');
    const hudBar = document.getElementById('hud-bar');
    const badge = document.getElementById('system-status-badge');
    const badgeText = document.getElementById('system-status-text');

    const stepNodes = [
      document.getElementById('step-node-1'),
      document.getElementById('step-node-2'),
      document.getElementById('step-node-3'),
      document.getElementById('step-node-4')
    ];
    const stepConns = [
      document.getElementById('step-conn-1'),
      document.getElementById('step-conn-2'),
      document.getElementById('step-conn-3')
    ];

    function runSimulation() {
      if (simBtn.classList.contains('simulating')) return;

      // 1. Lock simulation button & update status badge
      simBtn.classList.add('simulating');
      simBtn.innerHTML = '<i class="fa-solid fa-spinner"></i> Simulating event...';
      badge.classList.add('danger-badge');
      badgeText.innerText = "CRITICAL EVENT ACTIVE";

      // 2. Open diagnostic overlay
      simOverlay.classList.add('show-overlay');

      // Initialize step nodes layout
      stepNodes[0].className = "step-node step-active";
      stepNodes[1].className = "step-node";
      stepNodes[2].className = "step-node";
      stepNodes[3].className = "step-node";
      stepConns[0].className = "step-connector";
      stepConns[1].className = "step-connector";
      stepConns[2].className = "step-connector";

      // Reset loading progress bar
      hudBar.style.transition = 'none';
      hudBar.style.width = '0%';
      setTimeout(() => {
        hudBar.style.transition = 'width 3.5s linear';
        hudBar.style.width = '100%';
      }, 50);

      // Start Sequence Step 1: Crash Reconstruction
      switchTab('reconstruction');
      hudMessage.innerText = "Impact detected. Reconstructing crash truth...";
      postToIframe('iframe-reconstruction', 'START_CRASH_RECONSTRUCTION');
      postToIframe('iframe-autopilot', 'START_CRASH_RECONSTRUCTION');

      // Step 2: Vital Signs (after 3.5s)
      setTimeout(() => {
        switchTab('vitals');
        hudMessage.innerText = "Irregular vitals detected. Preparing emergency medical data...";
        
        // Update Step node Indicators
        stepNodes[0].className = "step-node step-completed";
        stepNodes[1].className = "step-node step-active";
        stepConns[0].className = "step-connector step-completed";

        // Reset and trigger loader bar
        hudBar.style.transition = 'none';
        hudBar.style.width = '0%';
        setTimeout(() => {
          hudBar.style.transition = 'width 3.5s linear';
          hudBar.style.width = '100%';
        }, 50);

        // Access the vital-signs iframe content to simulate critical vital triggers
        postToIframe('iframe-vitals', 'START_VITALS_EMERGENCY');

      }, 3500);

      // Step 3: Road Memory (after another 3.5s)
      setTimeout(() => {
        switchTab('road');
        hudMessage.innerText = "Incident added to collective road memory.";

        // Update Step node Indicators
        stepNodes[1].className = "step-node step-completed";
        stepNodes[2].className = "step-node step-active";
        stepConns[1].className = "step-connector step-completed";

        // Reset and trigger loader bar
        hudBar.style.transition = 'none';
        hudBar.style.width = '0%';
        setTimeout(() => {
          hudBar.style.transition = 'width 3.5s linear';
          hudBar.style.width = '100%';
        }, 50);

        // Access the road-memory iframe content to trigger collision zone warning map event
        postToIframe('iframe-road', 'ADD_ROAD_MEMORY_INCIDENT');

      }, 7000);

      // Final: Finish Sequence (after final 3.5s)
      setTimeout(() => {
        stepNodes[2].className = "step-node step-completed";
        stepNodes[3].className = "step-node step-active";
        stepConns[2].className = "step-connector step-completed";
        hudMessage.innerText = "Evidence packet compiled for responders and insurers.";
      }, 9900);

      setTimeout(() => {
        stepNodes[3].className = "step-node step-completed";
        
        // Close overlay smoothly
        simOverlay.classList.remove('show-overlay');

        // Set to crash active, update simulation button to Reset state
        isCrashActive = true;
        simBtn.classList.remove('simulating');
        simBtn.classList.add('reset-state');
        simBtn.innerHTML = '<i class="fa-solid fa-rotate-left"></i> Reset Dashboard';

      }, 11500);
    }

    // Helper function to send message to iframe
    function postToIframe(iframeId, message) {
      const iframe = document.getElementById(iframeId);
      if (iframe && iframe.contentWindow) {
        try {
          iframe.contentWindow.postMessage(message, '*');
        } catch (e) {
          console.warn(`Error postMessage to ${iframeId}:`, e);
        }
      }
    }

    function resetSystem() {
      isCrashActive = false;
      
      // Restore parent HUD badges and simulation button
      badge.classList.remove('danger-badge');
      badgeText.innerText = "Active Monitoring";
      
      simBtn.classList.remove('simulating');
      simBtn.classList.remove('reset-state');
      simBtn.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Simulate Crash Event';
      
      // Propagate reset to other iframes
      postToIframe('iframe-reconstruction', 'RESET_DEMO');
      postToIframe('iframe-road', 'RESET_DEMO');
      postToIframe('iframe-vitals', 'RESET_DEMO');
      postToIframe('iframe-autopilot', 'RESET_DEMO');
    }

    // Listen for events from sub-modules
    window.addEventListener('message', (event) => {
      if (event.data === 'RESET_DEMO') {
        resetSystem();
      } else if (event.data === 'START_SIMULATION') {
        runSimulation();
      }
    });

    // Attach simulation listener
    simBtn.addEventListener('click', () => {
      if (isCrashActive) {
        resetSystem();
      } else {
        runSimulation();
      }
    });

    // Expand / Collapse Iframe view within the same tab
    const screenPanel = document.getElementById('main-screen-panel');
    const exitExpandBtn = document.getElementById('exit-expand-btn');
    const fullScreenBtn = document.getElementById('full-screen-btn');
    const evidenceBtn = document.getElementById('evidence-btn');

    fullScreenBtn.addEventListener('click', () => {
      screenPanel.classList.add('expanded-panel');
      exitExpandBtn.style.display = 'flex';
    });

    exitExpandBtn.addEventListener('click', () => {
      screenPanel.classList.remove('expanded-panel');
      exitExpandBtn.style.display = 'none';
    });

    evidenceBtn.addEventListener('click', () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'a4'
      });

      // Styling parameters
      const timestamp = new Date().toLocaleString();

      // Top dark header block
      doc.setFillColor(3, 5, 10);
      doc.rect(0, 0, 210, 38, 'F');

      // Title & Subtitle inside the block
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(22);
      doc.text('CLEARBOX EVIDENCE PACKET', 15, 18);

      doc.setTextColor(0, 235, 214);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.text('AI-DEFINED VEHICLE INCIDENT INTELLIGENCE', 15, 27);

      doc.setTextColor(148, 163, 184);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.text(`Generated: ${timestamp}`, 140, 27);

      // Cyan accent bar underneath
      doc.setFillColor(0, 235, 214);
      doc.rect(0, 38, 210, 2, 'F');

      let yPos = 55;

      function drawSection(title, bulletPoints) {
        // Section Header
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(13);
        doc.setTextColor(3, 5, 10);
        doc.text(title, 15, yPos);

        // Thin horizontal line
        doc.setDrawColor(226, 232, 240);
        doc.setLineWidth(0.5);
        doc.line(15, yPos + 2, 195, yPos + 2);

        yPos += 9;

        // Content
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(30, 41, 59);

        bulletPoints.forEach(point => {
          const splitLines = doc.splitTextToSize(point, 175);
          splitLines.forEach(line => {
            doc.text(line, 15, yPos);
            yPos += 5.5;
          });
        });
        
        yPos += 6; // spacing after section
      }

      // 1. Incident Chain
      drawSection('1. Incident Chain Timeline', [
        '• Truth: Crash reconstruction timeline captures speed, steering, brake pressure, G-force peak, Pre-Safe state, airbag deployment, fuel cut-off, and eCall beacon status.',
        '• Health: Contactless cabin sensors flag occupant Anes Abbas with asthma history, tachycardia, tachypnea, acute stress, and paramedic respiratory-equipment recommendation.',
        '• Road Memory: Federal Hwy / Bangsar-Mid Valley risk zone receives a new validated incident marker and updates nearby-driver hazard context.',
        '• Report: This packet is designed for first responders, claims triage, fleet safety teams, and post-incident audit.'
      ]);

      // 2. Data Sources
      drawSection('2. Raw Telemetry & Biosignal Diagnostics', [
        '• Vehicle Telemetry: speed, steering angle, brake pressure, longitudinal/lateral G-force, Pre-Safe checklist.',
        '• Cabin Biosignals: steering-wheel electrodes, rPPG camera, seat pressure sensors, acoustic stress analysis.',
        '• Road Memory Dataset: simulated Klang Valley hotspot records, incident count, location, risk reason, and 300m hazard boundary.'
      ]);

      // 3. Emergency Dispatch Info
      drawSection('3. Emergency SOS Summary Recommendations', [
        '• Status: High-impact collision detected.',
        '• eCall Dispatch Payload: Includes occupant biometric condition, precise GPS coordinates, targeted asthma/respiratory-risk warning, and immutable incident telemetry hash.'
      ]);

      // 4. Verification Details
      drawSection('4. Compliance Notice', [
        '• This evidence packet contains cryptographically compiled incident data generated locally by the Mercedes-Benz Vibathon ClearBox vehicle client. It should be replaced with production certified OEM, insurer, and municipal feeds.'
      ]);

      // Footer
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(8);
      doc.setTextColor(148, 163, 184);
      doc.text('ClearBox Incident Response | Mercedes-Benz Hackathon vibArc System', 15, 285);
      doc.text('Page 1 of 1', 180, 285);

      doc.save(`clearbox-evidence-packet-${Date.now()}.pdf`);
    });

    // --- Dynamic Iframe Height Auto-Resizing for Mobile ---
    function resizeIframeToFitContent() {
      // Only do this on mobile/tablets (max-width: 1100px)
      if (window.innerWidth > 1100) {
        const screenPanel = document.getElementById('main-screen-panel');
        if (screenPanel) screenPanel.style.height = '';
        const activeIframe = document.querySelector('.module-iframe.active-iframe');
        if (activeIframe) activeIframe.style.height = '';
        return;
      }

      const activeIframe = document.querySelector('.module-iframe.active-iframe');
      if (activeIframe && activeIframe.contentWindow && activeIframe.contentDocument) {
        try {
          const body = activeIframe.contentDocument.body;
          const html = activeIframe.contentDocument.documentElement;
          if (body && html) {
            // Find the correct content height
            const height = Math.max(
              body.scrollHeight,
              body.offsetHeight,
              html.clientHeight,
              html.scrollHeight,
              html.offsetHeight
            );
            
            if (height > 0) {
              const screenPanel = document.getElementById('main-screen-panel');
              if (screenPanel) screenPanel.style.height = `${height}px`;
              activeIframe.style.height = `${height}px`;
            }
          }
        } catch (e) {
          console.warn("Unable to resize iframe:", e);
        }
      }
    }

    // Call resize on window actions and iframe load events
    window.addEventListener('resize', resizeIframeToFitContent);

    window.addEventListener('DOMContentLoaded', () => {
      const iframes = document.querySelectorAll('.module-iframe');
      iframes.forEach(iframe => {
        iframe.addEventListener('load', resizeIframeToFitContent);
      });
      // Initial trigger
      setTimeout(resizeIframeToFitContent, 300);
    });

    // Run periodic check to handle dynamic page expansions (like dialogue typewriter updates)
    setInterval(resizeIframeToFitContent, 300);

  </script>

</body>
</html>
